name: CD – Build, Push & Deploy

# ─────────────────────────────────────────────────────────────
# Triggers ONLY when the CI workflow completes successfully on
# the main branch. This guarantees tests pass before deploying.
# ─────────────────────────────────────────────────────────────
on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

permissions:
  contents: read
  packages: write   # Required to push backend image to GHCR

# Cancel any in-progress CD run if a newer one is triggered
concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY:      ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/oms-backend

jobs:

  # ───────────────────────────────────────────────────────────
  # Guard: skip the whole pipeline if CI failed
  # ───────────────────────────────────────────────────────────
  guard:
    name: CI Status Gate
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: CI passed – proceeding to deploy
        run: echo "CI finished successfully. Starting CD pipeline."

  # ───────────────────────────────────────────────────────────
  # Job 1: Build & push the Backend Docker image to GHCR
  # (Backend runs on Catalyst AppSail – container-based)
  # ───────────────────────────────────────────────────────────
  build-push-backend:
    name: Build & Push Backend Image
    runs-on: ubuntu-latest
    needs: guard
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx (multi-platform cache support)
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            # Tag with short SHA for traceability (e.g. sha-a1b2c3d)
            type=sha,prefix=sha-,format=short
            # Always update the `latest` tag on main
            type=raw,value=latest,enable=true

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          dockerfile: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,scope=backend,mode=max

  # ───────────────────────────────────────────────────────────
  # Job 2: Build frontend static files (dist/)
  # (Frontend runs on Catalyst Slate – static hosting, no Docker)
  # ───────────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend (Static)
    runs-on: ubuntu-latest
    needs: guard
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Vite app
        working-directory: frontend
        run: npm run build
        # Output: frontend/dist/

      - name: Upload dist/ as artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: error
          retention-days: 1

  # ───────────────────────────────────────────────────────────
  # Job 3: Deploy Backend to Zoho Catalyst AppSail
  # ───────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend → Catalyst AppSail
    runs-on: ubuntu-latest
    needs: [build-push-backend, build-frontend]
    environment:
      name: production
      url: https://omsbackend-${{ vars.CATALYST_PROJECT_DOMAIN }}.catalystappsail.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Node.js (for Catalyst CLI)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Zoho Catalyst CLI
        run: npm install -g @zoho-catalyst/cli

      - name: Get Catalyst Access Token (OAuth refresh)
        id: zoho_token
        run: |
          RESPONSE=$(curl -s -X POST "https://accounts.zoho.in/oauth/v2/token" \
            -d "client_id=${{ secrets.ZOHO_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.ZOHO_CLIENT_SECRET }}" \
            -d "refresh_token=${{ secrets.ZOHO_REFRESH_TOKEN }}" \
            -d "grant_type=refresh_token")
          ACCESS_TOKEN=$(echo "$RESPONSE" | grep -o '"access_token":"[^"]*' | cut -d'"' -f4)
          if [ -z "$ACCESS_TOKEN" ]; then
            echo "Failed to get access token. Response: $RESPONSE"
            exit 1
          fi
          echo "::add-mask::$ACCESS_TOKEN"
          echo "access_token=$ACCESS_TOKEN" >> $GITHUB_OUTPUT

      - name: Authenticate Catalyst CLI
        run: catalyst login --token "${{ steps.zoho_token.outputs.access_token }}"

      - name: Deploy backend AppSail service
        env:
          CATALYST_PROJECT_ID: ${{ secrets.CATALYST_PROJECT_ID }}
          BACKEND_IMAGE_URI: ${{ env.BACKEND_IMAGE }}:latest
        run: |
          catalyst appsail push \
            --project "$CATALYST_PROJECT_ID" \
            --service omsbackend \
            --image "$BACKEND_IMAGE_URI" \
            --registry-type GHCR \
            --registry-user "${{ github.actor }}" \
            --registry-token "${{ secrets.GHCR_PAT }}"

      - name: Confirm backend deployment
        run: |
          echo "Backend deployed to Catalyst AppSail."
          echo "Image: ${{ env.BACKEND_IMAGE }}:latest"

  # ───────────────────────────────────────────────────────────
  # Job 4: Deploy Frontend to Zoho Catalyst Slate (static hosting)
  # Uploads the built dist/ folder – no Docker involved.
  # ───────────────────────────────────────────────────────────
  deploy-frontend-slate:
    name: Deploy Frontend → Catalyst Slate
    runs-on: ubuntu-latest
    needs: [build-push-backend, build-frontend]
    environment:
      name: production
      url: https://${{ vars.CATALYST_PROJECT_DOMAIN }}.catalystserverless.in

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Download frontend dist artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Zoho Catalyst CLI
        run: npm install -g @zoho-catalyst/cli

      - name: Get Catalyst Access Token (OAuth refresh)
        id: zoho_token
        run: |
          RESPONSE=$(curl -s -X POST "https://accounts.zoho.in/oauth/v2/token" \
            -d "client_id=${{ secrets.ZOHO_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.ZOHO_CLIENT_SECRET }}" \
            -d "refresh_token=${{ secrets.ZOHO_REFRESH_TOKEN }}" \
            -d "grant_type=refresh_token")
          ACCESS_TOKEN=$(echo "$RESPONSE" | grep -o '"access_token":"[^"]*' | cut -d'"' -f4)
          if [ -z "$ACCESS_TOKEN" ]; then
            echo "Failed to get access token. Response: $RESPONSE"
            exit 1
          fi
          echo "::add-mask::$ACCESS_TOKEN"
          echo "access_token=$ACCESS_TOKEN" >> $GITHUB_OUTPUT

      - name: Authenticate Catalyst CLI
        run: catalyst login --token "${{ steps.zoho_token.outputs.access_token }}"

      - name: Deploy static files to Catalyst Slate
        env:
          CATALYST_PROJECT_ID: ${{ secrets.CATALYST_PROJECT_ID }}
        run: |
          catalyst deploy \
            --project "$CATALYST_PROJECT_ID" \
            --only web

      - name: Confirm frontend deployment
        run: echo "Frontend deployed to Catalyst Slate (static hosting)."

  # ───────────────────────────────────────────────────────────
  # Job 5: Post-deployment summary
  # ───────────────────────────────────────────────────────────
  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend-slate]
    if: always()
    steps:
      - name: Print deployment result
        run: |
          echo "========================================="
          echo "  OMS Deployment Summary"
          echo "========================================="
          echo "  Backend  → Catalyst AppSail (Docker/GHCR)"
          echo "  Frontend → Catalyst Slate   (static dist/)"
          echo "  Commit SHA : ${{ github.event.workflow_run.head_sha }}"
          echo "  Backend  : ${{ needs.deploy-backend.result }}"
          echo "  Frontend : ${{ needs.deploy-frontend-slate.result }}"
          echo "========================================="
