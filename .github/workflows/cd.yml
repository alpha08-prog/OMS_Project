name: CD – Build, Push & Deploy

# ─────────────────────────────────────────────────────────────
# Triggers ONLY when the CI workflow completes successfully on
# the main branch. This guarantees tests pass before deploying.
# ─────────────────────────────────────────────────────────────
on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

permissions:
  contents: read
  packages: write   # Required to push images to GHCR

# Cancel any in-progress CD run if a newer one is triggered
concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE:  ghcr.io/${{ github.repository_owner }}/oms-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/oms-frontend

jobs:

  # ───────────────────────────────────────────────────────────
  # Guard: skip the whole pipeline if CI failed
  # ───────────────────────────────────────────────────────────
  guard:
    name: CI Status Gate
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: CI passed – proceeding to deploy
        run: echo "CI finished successfully. Starting CD pipeline."

  # ───────────────────────────────────────────────────────────
  # Job 1: Build & push the Backend Docker image to GHCR
  # ───────────────────────────────────────────────────────────
  build-push-backend:
    name: Build & Push Backend Image
    runs-on: ubuntu-latest
    needs: guard
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx (multi-platform cache support)
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            # Tag with short SHA for traceability (e.g. sha-a1b2c3d)
            type=sha,prefix=sha-,format=short
            # Always update the `latest` tag on main
            type=raw,value=latest,enable=true

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          dockerfile: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer caching via GitHub Actions cache
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,scope=backend,mode=max

  # ───────────────────────────────────────────────────────────
  # Job 2: Build & push the Frontend Docker image to GHCR
  # ───────────────────────────────────────────────────────────
  build-push-frontend:
    name: Build & Push Frontend Image
    runs-on: ubuntu-latest
    needs: guard
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=true

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          dockerfile: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,scope=frontend,mode=max

  # ───────────────────────────────────────────────────────────
  # Job 3: Deploy Backend to Zoho Catalyst AppSail
  # Runs after both images are successfully pushed.
  # ───────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend → Catalyst AppSail
    runs-on: ubuntu-latest
    needs: [build-push-backend, build-push-frontend]
    environment:
      name: production
      url: https://omsbackend-${{ vars.CATALYST_PROJECT_DOMAIN }}.catalystappsail.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Node.js (for Catalyst CLI)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Zoho Catalyst CLI
        run: npm install -g @zoho-catalyst/cli

      - name: Authenticate with Catalyst
        run: catalyst login --token "${{ secrets.CATALYST_TOKEN }}"

      - name: Deploy backend AppSail service
        env:
          CATALYST_PROJECT_ID: ${{ secrets.CATALYST_PROJECT_ID }}
          BACKEND_IMAGE_URI: ${{ env.BACKEND_IMAGE }}:latest
        run: |
          catalyst appsail push \
            --project "$CATALYST_PROJECT_ID" \
            --service omsbackend \
            --image "$BACKEND_IMAGE_URI" \
            --registry-type GHCR \
            --registry-user "${{ github.actor }}" \
            --registry-token "${{ secrets.GHCR_PAT }}"

      - name: Verify backend deployment
        run: |
          echo "Backend deployment submitted to Catalyst AppSail."
          echo "Image: ${{ env.BACKEND_IMAGE }}:latest"

  # ───────────────────────────────────────────────────────────
  # Job 4: Deploy Frontend to Zoho Catalyst AppSail
  # ───────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend → Catalyst AppSail
    runs-on: ubuntu-latest
    needs: [build-push-backend, build-push-frontend]
    environment:
      name: production
      url: https://omsfrontend-${{ vars.CATALYST_PROJECT_DOMAIN }}.catalystappsail.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Node.js (for Catalyst CLI)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Zoho Catalyst CLI
        run: npm install -g @zoho-catalyst/cli

      - name: Authenticate with Catalyst
        run: catalyst login --token "${{ secrets.CATALYST_TOKEN }}"

      - name: Deploy frontend AppSail service
        env:
          CATALYST_PROJECT_ID: ${{ secrets.CATALYST_PROJECT_ID }}
          FRONTEND_IMAGE_URI: ${{ env.FRONTEND_IMAGE }}:latest
        run: |
          catalyst appsail push \
            --project "$CATALYST_PROJECT_ID" \
            --service omsfrontend \
            --image "$FRONTEND_IMAGE_URI" \
            --registry-type GHCR \
            --registry-user "${{ github.actor }}" \
            --registry-token "${{ secrets.GHCR_PAT }}"

      - name: Verify frontend deployment
        run: |
          echo "Frontend deployment submitted to Catalyst AppSail."
          echo "Image: ${{ env.FRONTEND_IMAGE }}:latest"

  # ───────────────────────────────────────────────────────────
  # Job 5: Post-deployment summary
  # ───────────────────────────────────────────────────────────
  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: always()
    steps:
      - name: Print deployment result
        run: |
          echo "========================================="
          echo "  OMS Deployment Summary"
          echo "========================================="
          echo "  Backend  image : ${{ env.BACKEND_IMAGE }}:latest"
          echo "  Frontend image : ${{ env.FRONTEND_IMAGE }}:latest"
          echo "  Registry       : GitHub Container Registry (GHCR)"
          echo "  Platform       : Zoho Catalyst AppSail"
          echo "  Commit SHA     : ${{ github.event.workflow_run.head_sha }}"
          echo "  Status         : ${{ needs.deploy-backend.result }} / ${{ needs.deploy-frontend.result }}"
          echo "========================================="
